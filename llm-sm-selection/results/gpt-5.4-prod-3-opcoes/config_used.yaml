metadata:
  experiment_id: "EXP_008"
  description: "Experimento para avaliar o desempenho do gpt-5.4 e articles_2 na classificação de artigos. Os criterios foram refomulados para frases no afirmativo."
  notes: "100 primeiros artigos do dataset serão utilizados para avaliação. A resposta do modelo é YES, NO, UNCLEAR"

llm_configs:
  provider: "openai"
  model: "gpt-5.4"
  temperature: 0
  top_p: 0.1
  max_output_tokens: 2000
  dataset: "articles_2.json"

eligibility_criteria:
  inclusion:
    CI1: "This study explicitly addresses software engineering lifecycle practices (development, evolution, or maintenance) applied to Artificial Intelligence-based systems."
    CI2: "This study explicitly presents, proposes, or evaluates best practices, guidelines, recommendations, or design patterns specifically aimed at the development of AI systems."
    CI3: "This study explicitly identifies and discusses challenges, open problems, or limitations regarding the integration of Software Engineering methodologies with Artificial Intelligence"