eligibility_criteria:
  inclusion:
    CI1: "Studies that address software engineering in the development, evolution, or maintenance of Artificial Intelligence-based systems."
    CI2: "Studies that present best practices, recommendations, or patterns for the development of AI systems."
    CI3: "Studies that identify challenges, open problems, and limitations in the integration between Software Engineering and AI."