  description: "Experimento para avaliar o desempenho do Gemini 3.0 flash na classificação de artigos."
  notes: "100 primeiros artigos do dataset serão utilizados para avaliação."

llm_configs:
  provider: "google"
  model: "gemini-3-flash-preview"
